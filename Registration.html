<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello - Users</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Palette Moderne & Professionnelle */
            --primary: #f1c40f;   /* Jaune Or (GazCamer Accent) */
            --secondary: #0a192f; /* Bleu Nuit Profond (Confiance, Industrie) */
            --dark-acc: #112240;  /* Bleu légèrement plus clair */
            --text-light: #ccd6f6;
            --white: #ffffff;
            --success: #2ecc71;
            --danger: #e74c3c;
            --ease: cubic-bezier(0.23, 1, 0.32, 1); /* Transition ultra-fluide */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Segoe UI', sans-serif; }
        
        body { 
            background-color: var(--secondary); 
            color: var(--text-light); 
            overflow-x: hidden;
            opacity: 0;
            animation: fadeInBody 1s var(--ease) forwards;
        }

        @keyframes fadeInBody { to { opacity: 1; } }

        /* --- NAVIGATION MINIMALISTE --- */
        nav {
            background: rgba(10, 25, 47, 0.85);
            backdrop-filter: blur(10px);
            padding: 1.2rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            position: fixed; top: 0; width: 100%; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { 
            font-size: 1.6rem; font-weight: 800; color: var(--white); 
            letter-spacing: -1px; display: flex; align-items: center; gap: 10px;
        }
        .logo i { color: var(--primary); }
        .logo span { color: var(--primary); }

        .nav-links { display: flex; gap: 15px; }
        .nav-links button {
            background: none; border: 1px solid transparent; padding: 8px 18px;
            border-radius: 50px; cursor: pointer; font-weight: 500; color: var(--text-light);
            transition: all 0.4s var(--ease); font-size: 0.9rem;
        }
        .nav-links button:hover, .nav-links button.active-nav {
            border-color: var(--primary); color: var(--primary); background: rgba(241, 196, 15, 0.05);
        }

        /* --- SECTION ACCUEIL : L'EFFET "WOUAH" --- */
        #accueil {
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
            background: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
        }

        /* Bouteilles flottantes en arrière-plan (Parallaxe) */
        .floating-gas {
            position: absolute; opacity: 0.1; pointer-events: none;
            filter: grayscale(100%) brightness(150%);
            animation: floatAround infinite linear;
        }
        /* Positions et tailles variées pour le réalisme */
        .gas-1 { width: 150px; top: 15%; left: 10%; animation-duration: 25s; }
        .gas-2 { width: 100px; top: 60%; left: 15%; animation-duration: 30s; animation-direction: reverse; }
        .gas-3 { width: 180px; top: 20%; right: 10%; animation-duration: 20s; }
        .gas-4 { width: 120px; top: 70%; right: 20%; animation-duration: 35s; }

        @keyframes floatAround {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* Hero Card - Effet 3D Perspectif */
        .hero-perspective {
            perspective: 1000px;
            z-index: 10;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 60px 50px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transform-style: preserve-3d;
            transition: transform 0.1s ease; /* Fluidité du mouvement de souris */
        }

        .hero-card h1 {
            font-size: 3.5rem; color: var(--white); line-height: 1.1;
            margin-bottom: 20px; font-weight: 800;
            transform: translateZ(50px); /* Sort de la carte */
        }
        .hero-card h1 span { color: var(--primary); }

        .hero-card p {
            font-size: 1.2rem; color: var(--text-light); max-width: 600px;
            margin: 0 auto 40px; opacity: 0.8;
            transform: translateZ(30px);
        }

        /* Bouton avec Animation de Touche (Pulse) */
        .btn-order-hero {
            background: var(--primary); color: var(--secondary);
            padding: 18px 45px; border-radius: 50px; border: none;
            font-size: 1.1rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; cursor: pointer;
            transition: all 0.4s var(--ease);
            position: relative; overflow: hidden;
            transform: translateZ(60px);
            box-shadow: 0 10px 20px rgba(241, 196, 15, 0.2);
        }

        .btn-order-hero:hover {
            transform: translateZ(60px) translateY(-5px);
            box-shadow: 0 15px 30px rgba(241, 196, 15, 0.4);
        }

        /* Animation de pulsation douce (touche) */
        .btn-order-hero::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.3); border-radius: 50px;
            opacity: 0; animation: pulseBtn 2s infinite;
        }
        @keyframes pulseBtn {
            0% { transform: scale(1); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        /* --- EFFET DE FLASH (GLOBAL) --- */
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--white); z-index: 2000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.1s ease-out;
        }
        #flash-overlay.flash-active {
            opacity: 1;
            transition: opacity 0.05s ease-in; /* Flash très rapide */
        }

        /* --- SECTIONS (Contenu standard) --- */
        .container {
            padding: 120px 5% 60px; /* Espace pour la nav fixe */
            display: none; opacity: 0; transform: translateY(20px);
            min-height: 80vh;
        }
        .container.active {
            display: block;
            animation: sectionIn 0.8s var(--ease) forwards;
        }

        @keyframes sectionIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Formulaire stylisé */
        .form-card {
            background: var(--dark-acc); padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 650px; margin: auto;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .form-card h2 { color: var(--white); margin-bottom: 30px; text-align: center; }
        
        .form-group label { color: var(--text-light); font-size: 0.9rem; margin-bottom: 8px; }
        input, select {
            background: rgba(10, 25, 47, 0.5); border: 1px solid rgba(255,255,255,0.1);
            color: var(--white); padding: 12px; border-radius: 6px;
            transition: 0.3s;
        }
        input:focus, select:focus {
            outline: none; border-color: var(--primary); background: rgba(10, 25, 47, 0.8);
        }

        .preview-box {
            background: rgba(0,0,0,0.2); border: 1px dashed rgba(255,255,255,0.1);
            padding: 20px; border-radius: 8px; margin: 25px 0; text-align: center;
        }
        .preview-title { color: var(--primary); font-weight: 600; margin-bottom: 15px; }
        .preview-box img { max-height: 180px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }

        /* Table Admin Moderne */
        table { background: var(--dark-acc); border-radius: 8px; overflow: hidden; }
        th { background: rgba(0,0,0,0.2); color: var(--primary); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }
        td { border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text-light); }
        tr:last-child td { border-bottom: none; }
        
        .status { padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; }
        .status-valid { background: rgba(46, 204, 113, 0.15); color: var(--success); }
        .status-expired { background: rgba(231, 76, 60, 0.15); color: var(--danger); }

        /* --- FOOTER SOMBRE --- */
        footer {
            background: rgba(0,0,0,0.2); color: var(--text-light);
            padding: 50px 5% 20px; border-top: 1px solid rgba(255,255,255,0.03);
        }
        .footer-content { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 30px; max-width: 1200px; margin: auto; }
        .footer-links a { color: var(--text-light); font-size: 1.4rem; margin-left: 15px; transition: 0.3s; }
        .footer-links a:hover { color: var(--primary); transform: scale(1.1); }
        .ceo-contact { color: var(--primary); margin-top: 10px; display: block; font-size: 0.9rem; }
        .copyright { text-align: center; margin-top: 40px; font-size: 0.8rem; opacity: 0.6; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 20px; }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .hero-card { padding: 40px 20px; }
            .hero-card h1 { font-size: 2.2rem; }
            .nav-links button { padding: 6px 12px; font-size: 0.8rem; }
            .hero-perspective { perspective: none; } /* Disable 3D on mobile */
            .hero-card { transform: none !important; }
        }
    </style>
</head>
</head>
<body>
    
    <div id="flash-overlay"></div>

    <nav>
        <div class="logo">
            <a href="index.html">Accueil</a>
            <i class="fas fa-gas-pump"></i>
            <span>Gaz</span>Camer
        </div>
    </nav>

    <section id="commande" class="container">
        <div class="form-card">
            <h2>Nouvelle Réservation</h2>
            <form id="orderForm">
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Nom</label>
                        <input type="text" id="nom" placeholder="Ex: Eto'o" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Prénom</label>
                        <input type="text" id="prenom" placeholder="Ex: Samuel" required>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top:15px;">
                    <label>Numéro de Téléphone</label>
                    <input type="tel" id="tel" placeholder="6XXXXXXXX" required pattern="[6][0-9]{8}">
                </div>
                
                <div class="form-group" style="margin-top:15px;">
                    <label>Quartier / Adresse de récupération</label>
                    <input type="text" id="adresse" placeholder="Ex: Akwa, Rue Joffre" required>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 25px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Marque de Gaz</label>
                        <select id="marque" onchange="updateImage()" required>
                            <option value="SCTM">SCTM</option>
                            <option value="Tradex">Tradex</option>
                            <option value="TotalEnergies">TotalEnergies</option>
                            <option value="Camgaz">Camgaz</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Taille</label>
                        <select id="taille" onchange="updateImage()" required>
                            <option value="12.5kg">Normale - 12.5 kg</option>
                            <option value="6kg">Petite - 6 kg</option>
                        </select>
                    </div>
                </div>

                <div class="preview-box">
                    <div class="preview-title" id="preview-text">unique - 12.5kg</div>
                    <img src="https://ibb.co/Jjk2J0L8" alt="Aperçu">
                </div>
                <div style="display: flex; gap: 15px; align-items: flex-end;">
                    <div class="form-group" style="flex: 2;">
                        <label>Type de Client</label>
                        <select id="statut">
                            <option value="Particulier">Particulier</option>
                            <option value="Grossiste">Grossiste / Restaurant</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Quantité</label>
                        <input type="number" id="quantite" min="1" value="1" required>
                    </div>
                </div>

                <button type="submit" class="btn-order-hero" style="width: 100%; border-radius: 8px; margin-top: 30px; transform: none;">Confirmer ma Réservation</button>
            </form>
        </div>
    </section>
    
    <footer>
        <div class="footer-content">
            <div style="flex: 1; min-width: 250px;">
                <h3 style="color: var(--white); margin-bottom: 10px;">GazCamer S.A.</h3>
                <p style="font-size: 0.9rem; opacity: 0.8;">Distributeur officiel agréé de gaz domestique sur tout le territoire national camerounais. La sécurité et la disponibilité avant tout.</p>
            </div>
            <div class="footer-links">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-whatsapp"></i></a>
                <a href="#"><i class="fas fa-envelope"></i></a>
                <span class="ceo-contact">Service Client: +237 680 00 00 00</span>
            </div>
        </div>
        <div class="copyright">
            &copy; 2026 GazCamer S.A. Tous droits réservés. PJD Design.
        </div>
    </footer>

</body>
</html>
